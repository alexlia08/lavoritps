<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>configurazione piattaforma</title>

<style>
body {
font-family: Arial, sans-serif;
background: #f5f5f5;
margin: 0;
padding: 30px;
}

h1 {
text-align: center;
}

#box-caricamento {
background: white;
border: 1px solid #ccc;
padding: 20px;
margin: 20px auto;
width: 400px;
text-align: center;
}

#output {
background: white;
border: 1px solid #ccc;
padding: 15px;
width: 80%;
margin: auto;
height: 300px;
overflow-y: auto;
font-family: monospace;
}

input[type="file"] {
margin-top: 10px;
}
</style>

</head>
<body>

<h1>Lettore file CSV</h1>

<div id="box-caricamento">
<h2>Scegli il file .csv</h2>
<input type="file" id="fileInput" accept=".csv">
</div>

<button type="button" id="button">vai al catalogo</button>


<script>
  const button = document.getElementById("button");
  const fileInput = document.getElementById("fileInput");
  button.onclick = function () {
    if (!fileInput.files.length) {
      alert("seleziona un file csv prima di continuare");
      return;
    }
    const file = fileInput.files[0];
    const reader = new FileReader();

    reader.onload = function (e) {
      const testo = e.target.result;
      localStorage.setItem("csvdata",testo);
      window.location.href = "catalogo.html";
    }
    reader.readAsText(file);
  });
  
  
  


</script>

</body>
</html>
